services:
  # The FastAPI Backend (Now connecting to Neon)
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: knowledge_base_api
    restart: always
    ports:
      - "8000:8000"
    # Read the database URL securely from the .env file
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
